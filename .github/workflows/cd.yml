# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["master"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  #
  enable-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Enable GitHub Pages (API)
        env:
          GH_TOKEN: ${{ secrets.PAGES_ADMIN_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
        run: |
          echo "Enabling Pages for $OWNER/$REPO"

          curl -L -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/$OWNER/$REPO/pages \
            -d '{"build_type":"workflow"}'
  deploy:
    needs: enable-pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      homepage: ${{ steps.seturl.outputs.homepage }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
      - name: Compute homepage URL
        id: seturl
        run: |
          HOMEPAGE="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          echo "homepage=$HOMEPAGE" >> $GITHUB_OUTPUT
  homepage:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Set repo homepage via GitHub API
        env:
          GH_TOKEN: ${{ secrets.PAGES_ADMIN_TOKEN }}
          HOMEPAGE: ${{ needs.deploy.outputs.homepage }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
        run: |
          echo "Setting homepage to: $HOMEPAGE"
          curl -L -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/$OWNER/$REPO \
            -d "{\"homepage\":\"$HOMEPAGE\"}"
